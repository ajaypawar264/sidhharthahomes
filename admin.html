<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
</style>

</head>

<body class="bg-gray-100">

<header class="flex justify-between px-10 py-4 bg-white shadow">
  <h1 class="text-xl font-bold">Admin Panel</h1>
  <a href="index.html">← Back to Site</a>
</header>

<section class="py-10 px-10 max-w-xl mx-auto">

<h2 class="text-2xl font-bold mb-6">Add Property</h2>

<form onsubmit="addProperty(event)" class="space-y-4">

<input id="title" type="text" placeholder="Property Name" required
class="w-full border px-4 py-2 rounded"/>

<input id="location" type="text" placeholder="Location" required
class="w-full border px-4 py-2 rounded"/>

<input id="image" type="text" placeholder="Image URL" required
class="w-full border px-4 py-2 rounded"/>

<button class="bg-black text-white px-6 py-2 rounded w-full">
Add Property
</button>

</form>

</section>

<script>
function addProperty(e){
  e.preventDefault();

  const title = document.getElementById("title").value;
  const location = document.getElementById("location").value;
  const image = document.getElementById("image").value;

  let properties = JSON.parse(localStorage.getItem("properties")) || [];

  properties.push({title, location, image});

  localStorage.setItem("properties", JSON.stringify(properties));

  alert("Property Added Successfully 🔥");

  document.getElementById("title").value="";
  document.getElementById("location").value="";
  document.getElementById("image").value="";
}
</script>

</body>
</html>
